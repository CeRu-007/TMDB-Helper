name: Docker Beta Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (如: beta, test, dev)'
        required: true
        default: 'beta'
        type: string

env:
  DOCKER_IMAGE: ceru007/tmdb-helper

jobs:
  build-beta:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push beta image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Beta 镜像构建完成"
          echo ""
          echo "镜像: ${{ env.DOCKER_IMAGE }}:${{ inputs.tag }}"
          echo ""
          echo "拉取命令:"
          echo "\`\`\`bash"
          echo "docker pull ${{ env.DOCKER_IMAGE }}:${{ inputs.tag }}"
          echo "\`\`\`"
