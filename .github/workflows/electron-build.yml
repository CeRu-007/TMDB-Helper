name: Build Electron App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本标签 (如: v1.0.0)'
        required: false
        type: string

env:
  NODE_VERSION: '22'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows
            artifact_name: windows
          - platform: mac
            artifact_name: mac
          - platform: linux
            artifact_name: linux

    runs-on: ${{ matrix.platform == 'windows' && 'windows-latest' || (matrix.platform == 'mac' && 'macos-latest' || 'ubuntu-latest') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron App
        run: pnpm run electron:build:${{ matrix.artifact_name }}
        if: matrix.platform != 'linux'
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build Electron App (Linux)
        run: pnpm run electron:build:linux
        if: matrix.platform == 'linux'
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        if: matrix.platform == 'windows'
        with:
          name: windows-exe
          path: |
            dist/win-unpacked/*.exe
            dist/*.exe
          retention-days: 7

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        if: matrix.platform == 'mac'
        with:
          name: mac-dmg
          path: dist/*.dmg
          retention-days: 7

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure of downloaded files
        run: ls -laR dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}