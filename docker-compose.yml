version: '3.8'

services:
  tmdb-helper:
    image: ceru007/tmdb-helper:latest
    container_name: tmdb-helper
    ports:
      - "4949:4949"
    environment:
      # JWT_SECRET 必须设置
      # ADMIN_USERNAME / ADMIN_PASSWORD 可选：设置后自动创建管理员（直接登录）；
      #   不设置则首次访问进入注册流程
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:?必须设置 JWT_SECRET 环境变量}
      - SESSION_EXPIRY_DAYS=15
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - COOKIE_SECURE=true
      - DOCKER_CONTAINER=true
      - TMDB_DATA_DIR=/app/data
      - NODE_OPTIONS=--max-old-space-size=1024
      - PORT=4949
      - HOSTNAME=0.0.0.0
    volumes:
      - ${TMDB_DATA_PATH:-.}/data:/app/data
      - ${TMDB_DATA_PATH:-.}/logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.3'
        reservations:
          memory: 512M
          cpus: '0.15'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4949/api/auth/init"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tmdb-network

networks:
  tmdb-network:
    driver: bridge
