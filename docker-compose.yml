version: '3.8'

services:
  tmdb-helper:
    image: ceru007/tmdb-helper:latest
    container_name: tmdb-helper
    ports:
      - "4949:4949"
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=change_this_password
      - JWT_SECRET=your_jwt_secret_key_here_change_in_production
      - SESSION_EXPIRY_DAYS=15
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - COOKIE_SECURE=false
      - DOCKER_CONTAINER=true
      - TMDB_DATA_DIR=/app/data
      - NODE_OPTIONS=--max-old-space-size=1024
      - PORT=4949
      - HOSTNAME=0.0.0.0
    volumes:
      - ${TMDB_DATA_PATH:-.}/data:/app/data
      - ${TMDB_DATA_PATH:-.}/logs:/app/logs
    user: "0:0"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.3'
        reservations:
          memory: 512M
          cpus: '0.15'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4949/api/auth/init"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tmdb-network

networks:
  tmdb-network:
    driver: bridge
